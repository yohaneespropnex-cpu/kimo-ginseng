<!-- PLACEHOLDER — [GANTI] dengan foto produk asli Kimo Ginseng (PNG/JPG transparan) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" width="520" height="620">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c878"/>
      <stop offset="0.5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#a07d2e"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1810"/>
      <stop offset="1" stop-color="#0e0c08"/>
    </linearGradient>
  </defs>

  <!-- Kotak kemasan -->
  <rect x="150" y="90" width="220" height="420" rx="16" fill="url(#box)" stroke="url(#gold)" stroke-width="2"/>
  <rect x="150" y="90" width="220" height="420" rx="16" fill="none" stroke="#000" stroke-opacity="0.2" stroke-width="6"/>

  <!-- Aksen emas atas -->
  <rect x="150" y="90" width="220" height="70" rx="16" fill="url(#gold)" opacity="0.92"/>
  <rect x="150" y="148" width="220" height="12" fill="#0e0c08" opacity="0.25"/>

  <!-- Daun lambang -->
  <g transform="translate(260 250)">
    <circle r="58" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
    <path d="M-2 30A22 22 0 0 1 -6 -10C12 -14 16 -16 22 -28c3 6 5 12 5 22 0 18-16 36-31 36Z"
          fill="url(#gold)"/>
  </g>

  <!-- Teks brand -->
  <text x="260" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="url(#gold)" font-weight="700">KIMO</text>
  <text x="260" y="402" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#f3e9d2" letter-spacing="4">GINSENG</text>
  <line x1="205" y1="420" x2="315" y2="420" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <text x="260" y="448" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#cdc3ad" letter-spacing="2">GINSENG • ASHWAGANDHA</text>
  <text x="260" y="478" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#cdc3ad">Suplemen Herbal Premium</text>

  <!-- Label placeholder -->
  <text x="260" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#7a6f58">[ Ganti dengan foto produk asli ]</text>
</svg>
